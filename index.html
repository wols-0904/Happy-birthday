<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  /* Hide number input spinners */
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type="number"] {
    -moz-appearance: textfield;
  }

  /* Shake animation for wrong password */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 50%, 90% { transform: translateX(-6px); }
    30%, 70% { transform: translateX(6px); }
  }

  /* Fade-out animation */
  @keyframes fadeOut {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  /* Fade-in animation for hint */
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Button glow pulse */
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 12px rgba(244, 114, 182, 0.4), 0 0 24px rgba(244, 114, 182, 0.2); }
    50%      { box-shadow: 0 0 20px rgba(244, 114, 182, 0.6), 0 0 36px rgba(244, 114, 182, 0.3); }
  }

  /* Loading bar fill */
  .loading-bar-fill {
    transition: width 2s ease-in-out;
  }

  /* Ensure input caret is invisible — we style focus via ring */
  .pin-input {
    caret-color: transparent;
  }
  .pin-input:focus {
    caret-color: #94a3b8;
  }

  /* ---- 3D Flipping Card ---- */

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-14px); }
  }

  .card-scene {
    perspective: 1500px;
  }

  .card-wrapper {
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.4, 0.2, 0.2, 1);
  }

  .card-wrapper.is-flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    backface-visibility: hidden;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
  }

  /* ---- Magical text reveal ---- */

  @keyframes magicalFadeIn {
    from {
      opacity: 0;
      transform: translateY(15px);
      filter: blur(4px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }
  }

  .char-hidden {
    opacity: 0;
  }
</style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center overflow-hidden">

  <!-- Password lock container -->
  <div id="lock-container" class="flex flex-col items-center gap-8">

    <!-- Prompt -->
    <p class="text-slate-300 text-sm tracking-[0.3em] uppercase select-none">
      Please enter the access code
    </p>

    <!-- 4-digit PIN inputs -->
    <div id="pin-row" class="flex gap-4">
      <input type="number" id="pin-0" maxlength="1"
        class="pin-input w-16 h-16 text-center text-2xl text-white bg-slate-800 border-2 border-slate-600 rounded-xl
               outline-none transition-colors duration-300
               focus:border-slate-400 focus:ring-2 focus:ring-slate-500/30" />
      <input type="number" id="pin-1" maxlength="1"
        class="pin-input w-16 h-16 text-center text-2xl text-white bg-slate-800 border-2 border-slate-600 rounded-xl
               outline-none transition-colors duration-300
               focus:border-slate-400 focus:ring-2 focus:ring-slate-500/30" />
      <input type="number" id="pin-2" maxlength="1"
        class="pin-input w-16 h-16 text-center text-2xl text-white bg-slate-800 border-2 border-slate-600 rounded-xl
               outline-none transition-colors duration-300
               focus:border-slate-400 focus:ring-2 focus:ring-slate-500/30" />
      <input type="number" id="pin-3" maxlength="1"
        class="pin-input w-16 h-16 text-center text-2xl text-white bg-slate-800 border-2 border-slate-600 rounded-xl
               outline-none transition-colors duration-300
               focus:border-slate-400 focus:ring-2 focus:ring-slate-500/30" />
    </div>

    <!-- Hint -->
    <p id="hint" class="text-xs text-slate-600 cursor-pointer select-none transition-colors duration-300 hover:text-slate-400 mt-2">
      💡 提示
    </p>

    <!-- Loading bar (hidden by default) -->
    <div id="loading-bar" class="w-[288px] h-[3px] bg-slate-800 rounded-full overflow-hidden opacity-0 transition-opacity duration-300">
      <div id="loading-bar-fill" class="loading-bar-fill h-full w-0 bg-emerald-400 rounded-full"></div>
    </div>

  </div>

  <!-- Phase 2: 3D Flipping Card (hidden initially) -->
  <div id="phase2-container" class="fixed inset-0 flex items-center justify-center" style="display: none; opacity: 0; transition: opacity 1s ease;">
    <div class="flex flex-col items-center gap-8">

      <!-- 3D Card scene (click target) -->
      <div id="card-scene" class="card-scene cursor-pointer flex items-center justify-center"
           style="width: 50vw; height: 66vh;">

        <div id="card-wrapper" class="card-wrapper relative w-full h-full">

          <!-- Front face: cover image -->
          <div id="card-front"
               class="card-face card-front absolute inset-0 overflow-hidden"
               style="background-image: url('./happybirthday.jpg'); background-size: cover; background-position: center;
                      /* animation: float 3.5s ease-in-out infinite;"*/ >
          </div>

          <!-- Back face: lined paper for text -->
          <div id="card-back"
               class="card-face card-back absolute inset-0 overflow-hidden flex items-center justify-center"
               style="transform: rotateY(180deg);
                      background-color: #faf9f6;
                      background-image: repeating-linear-gradient(to bottom, transparent, transparent 39px, #cbd5e1 39px, #cbd5e1 40px);">
            <div id="typed-target"
                 class="text-slate-700 text-center px-8 w-full"
                 style="font-family: 'Noto Serif SC', 'Ma Shan Zheng', serif; min-height: 80px; font-size: 1.05rem;"></div>
          </div>

        </div>
      </div>

      <!-- Final button (below card; hidden until typing completes) -->
      <button id="final-btn"
        class="relative px-10 py-3 text-base text-white font-medium rounded-full
               bg-gradient-to-r from-rose-500 to-pink-500
               transition-all duration-500 ease-out
               hover:scale-105 hover:shadow-lg hover:shadow-pink-500/30
               focus:outline-none"
        style="opacity: 0; pointer-events: none; animation: glowPulse 3s ease-in-out infinite;">
        开启最终仪式
      </button>

    </div>
  </div>

<script>
(function () {
  const CORRECT_PIN = '0623';
  const PIN_COUNT = 4;

  const container = document.getElementById('lock-container');
  const inputs = Array.from({ length: PIN_COUNT }, (_, i) => document.getElementById('pin-' + i));
  const pinRow = document.getElementById('pin-row');
  const hint = document.getElementById('hint');
  const loadingBar = document.getElementById('loading-bar');
  const loadingBarFill = document.getElementById('loading-bar-fill');
  const phase2Container = document.getElementById('phase2-container');
  const cardScene = document.getElementById('card-scene');
  const cardWrapper = document.getElementById('card-wrapper');
  const cardFront = document.getElementById('card-front');
  const typedTarget = document.getElementById('typed-target');
  const finalBtn = document.getElementById('final-btn');

  let locked = false; // prevents input after success

  // ---- helpers ----

  function getPinValue() {
    return inputs.map(inp => inp.value).join('');
  }

  function clearAll() {
    inputs.forEach(inp => { inp.value = ''; });
  }

  function setBorders(className) {
    inputs.forEach(inp => {
      inp.classList.remove('border-slate-600', 'border-emerald-500', 'border-red-500');
      if (className) inp.classList.add(className);
    });
  }

  function triggerShake() {
    pinRow.style.animation = 'none';
    // force reflow
    void pinRow.offsetWidth;
    pinRow.style.animation = 'shake 0.5s ease';
  }

  // ---- loading bar ----

  function showLoadingBar() {
    loadingBar.classList.remove('opacity-0');
    loadingBar.classList.add('opacity-100');
  }

  function fillLoadingBar() {
    // Force reflow so transition kicks in from 0
    void loadingBarFill.offsetWidth;
    loadingBarFill.style.width = '100%';
  }

  function fadeOutAndHide() {
    container.style.animation = 'fadeOut 1s ease forwards';
    container.addEventListener('animationend', function handler() {
      container.removeEventListener('animationend', handler);
      container.style.display = 'none';
      showPhase2();
    });
  }

  // ---- Phase 2 ----

  const LETTER_TEXT =
    '亲爱的你：\n\n' +
    '今天是一年中最特别的日子，属于你的日子。\n\n' +
    '愿所有美好如期而至，愿你眼里有光，心中有爱。\n\n' +
    '生日快乐。';

  function showPhase2() {
    phase2Container.style.display = 'flex';
    void phase2Container.offsetWidth;
    phase2Container.style.opacity = '1';
  }

  function renderMagicText(text, containerId) {
    var container = document.getElementById(containerId);
    container.innerHTML = '';
    container.style.fontSize = '18px';
    container.style.lineHeight = '40px';
    container.style.paddingTop = '40px';

    var lines = text.split('\n');
    var charIndex = 0;

    lines.forEach(function (line) {
      if (line === '') {
        var spacer = document.createElement('div');
        spacer.style.height = '40px';
        container.appendChild(spacer);
        return;
      }

      var lineDiv = document.createElement('div');

      for (var i = 0; i < line.length; i++) {
        var span = document.createElement('span');
        span.textContent = line[i];
        span.style.display = 'inline-block';
        span.style.animation = 'magicalFadeIn 0.6s ease both';
        span.style.animationDelay = (charIndex * 80) + 'ms';
        lineDiv.appendChild(span);
        charIndex++;
      }

      container.appendChild(lineDiv);
    });

    return charIndex;
  }

  // ---- card flip timeline ----

  cardScene.addEventListener('click', function onClick() {
    cardScene.style.pointerEvents = 'none';
    cardScene.style.cursor = 'default';
    cardFront.style.animation = 'none';

    // Flip the card (1.2s transition)
    cardWrapper.classList.add('is-flipped');

    // After flip completes, render text on the back face
    setTimeout(function () {
      var charCount = renderMagicText(LETTER_TEXT, 'typed-target');

      var textAnimMs = (charCount - 1) * 80 + 600;
      var buttonDelay = textAnimMs + 2000;

      setTimeout(function () {
        finalBtn.style.opacity = '1';
        finalBtn.style.pointerEvents = 'auto';
      }, buttonDelay);
    }, 1200);
  });

  // ---- validation ----

  function onComplete() {
    if (getPinValue() === CORRECT_PIN) {
      handleSuccess();
    } else {
      handleFailure();
    }
  }

  function handleSuccess() {
    locked = true;
    setBorders('border-emerald-500');
    inputs.forEach(inp => { inp.blur(); });

    showLoadingBar();

    // Small delay so the loading bar opacity transition is visible, then fill
    setTimeout(() => {
      fillLoadingBar();
    }, 50);

    // After 2s fill + 1s fadeOut = ~3s total
    setTimeout(() => {
      fadeOutAndHide();
    // Play background music (requires user gesture per autoplay policy)
    var bgm = document.getElementById('bgMusic');
    if (bgm) {
      bgm.volume = 0.5;
      bgm.play().catch(function (err) { console.log("BGM 播放被拦截:", err); });
    }
    }, 2100);
  }

  function handleFailure() {
    setBorders('border-red-500');
    triggerShake();

    setTimeout(() => {
      clearAll();
      setBorders('border-slate-600');
      inputs[0].focus();
    }, 500);
  }

  // ---- input handling ----

  inputs.forEach((input, idx) => {
    // Restrict to single digit
    input.addEventListener('input', function () {
      if (locked) return;

      const val = this.value;
      if (val.length > 1) {
        this.value = val.slice(-1);
      }

      // Auto-advance to next input
      if (this.value && idx < PIN_COUNT - 1) {
        inputs[idx + 1].focus();
      }

      // Check if all filled
      if (idx === PIN_COUNT - 1 && this.value) {
        onComplete();
      }
    });

    // Handle Backspace to go back
    input.addEventListener('keydown', function (e) {
      if (locked) {
        e.preventDefault();
        return;
      }

      if (e.key === 'Backspace') {
        if (!this.value && idx > 0) {
          inputs[idx - 1].value = '';
          inputs[idx - 1].focus();
          e.preventDefault();
        }
      }

      // Block non-digit keys (allow navigation & backspace)
      if (
        e.key.length === 1 &&
        !/\d/.test(e.key) &&
        e.key !== 'Backspace' &&
        e.key !== 'Tab' &&
        e.key !== 'ArrowLeft' &&
        e.key !== 'ArrowRight'
      ) {
        e.preventDefault();
      }
    });

    // Re-focus back after shake if user clicks into a box
    input.addEventListener('focus', function () {
      if (locked) {
        this.blur();
        return;
      }
    });
  });

  // ---- hint ----

  let hintRevealed = false;

  hint.addEventListener('click', function () {
    if (hintRevealed || locked) return;
    hintRevealed = true;

    hint.classList.remove('text-slate-600', 'hover:text-slate-400', 'cursor-pointer');
    hint.classList.add('text-slate-300', 'pointer-events-none');
    hint.style.animation = 'fadeIn 0.6s ease forwards';
    hint.textContent = '寿星想想今天的日期^_^';
  });

  // ---- start ----
  inputs[0].focus();

})();
</script>

<audio id="bgMusic" src="./二十二.mp3" loop preload="auto"></audio>

</body>
</html>
